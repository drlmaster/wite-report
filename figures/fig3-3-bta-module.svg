<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .title{font:700 30px Arial,Helvetica,sans-serif;fill:#263238}
      .subtitle{font:500 15px Arial,Helvetica,sans-serif;fill:#607d8b}
      .h{font:700 17px Arial,Helvetica,sans-serif;fill:#263238}
      .t{font:500 13px Arial,Helvetica,sans-serif;fill:#455a64}
      .s{font:500 11px Arial,Helvetica,sans-serif;fill:#607d8b}
      .eq{font:600 17px Arial,Helvetica,sans-serif;fill:#37474f}
      .box{rx:18;ry:18;stroke-width:2}
      .mini{rx:12;ry:12;stroke-width:2}
      .arrow{stroke:#78909c;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#90a4ae;stroke-width:2;fill:none;stroke-dasharray:7 7;marker-end:url(#arrow)}
      .thin{stroke:#90a4ae;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#78909c"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>
  <text x="800" y="55" text-anchor="middle" class="title">Figure 3-3. Bimanual Task-aware Adapter</text>
  <text x="800" y="82" text-anchor="middle" class="subtitle">Explicit roles, phase conditioning, action subspaces, and diagnosable supervision</text>

  <!-- Inputs -->
  <rect x="65" y="150" width="260" height="500" class="box" fill="#f6fbff" stroke="#b7d7ee"/>
  <text x="195" y="185" text-anchor="middle" class="h">Conditioned Inputs</text>
  <rect x="95" y="230" width="200" height="48" class="mini" fill="#ffffff" stroke="#cfe3f3"/>
  <text x="195" y="260" text-anchor="middle" class="t">Visual Features</text>
  <rect x="95" y="298" width="200" height="48" class="mini" fill="#ffffff" stroke="#cfe3f3"/>
  <text x="195" y="328" text-anchor="middle" class="t">Robot State</text>
  <rect x="95" y="366" width="200" height="48" class="mini" fill="#ffffff" stroke="#cfe3f3"/>
  <text x="195" y="396" text-anchor="middle" class="t">Language Goal</text>
  <rect x="95" y="434" width="200" height="48" class="mini" fill="#fff8ef" stroke="#efd1a8"/>
  <text x="195" y="464" text-anchor="middle" class="t">Task Role Token</text>
  <rect x="95" y="502" width="200" height="48" class="mini" fill="#fff8ef" stroke="#efd1a8"/>
  <text x="195" y="532" text-anchor="middle" class="t">Phase Prompt</text>
  <text x="195" y="603" text-anchor="middle" class="s">RIGHT_GRASP_BOTTLE</text>
  <text x="195" y="625" text-anchor="middle" class="s">BIMANUAL_HOLD_POUR</text>

  <!-- Fusion -->
  <rect x="410" y="205" width="300" height="190" class="box" fill="#f7f5ff" stroke="#cdc4ef"/>
  <text x="560" y="240" text-anchor="middle" class="h">Task-aware Fusion</text>
  <rect x="455" y="278" width="210" height="54" class="mini" fill="#ffffff" stroke="#ded7f5"/>
  <text x="560" y="312" text-anchor="middle" class="t">VLA Feature Adapter</text>
  <text x="560" y="365" text-anchor="middle" class="s">role + phase + observation</text>

  <!-- Policy and decoder -->
  <rect x="405" y="475" width="310" height="175" class="box" fill="#f3fbf6" stroke="#b8dec6"/>
  <text x="560" y="512" text-anchor="middle" class="h">Action Chunk Decoder</text>
  <rect x="450" y="548" width="220" height="52" class="mini" fill="#ffffff" stroke="#cfead8"/>
  <text x="560" y="581" text-anchor="middle" class="t">Predict H-step Actions</text>

  <!-- Action subspaces -->
  <rect x="830" y="145" width="355" height="320" class="box" fill="#fbfbfd" stroke="#d6dce2"/>
  <text x="1008" y="180" text-anchor="middle" class="h">Action Subspace Split</text>
  <rect x="865" y="225" width="130" height="72" class="mini" fill="#f1f9ef" stroke="#a9d19f"/>
  <text x="930" y="255" text-anchor="middle" class="t">Left Arm</text>
  <text x="930" y="276" text-anchor="middle" class="s">A_L</text>
  <rect x="1020" y="225" width="130" height="72" class="mini" fill="#fff3ed" stroke="#eab29a"/>
  <text x="1085" y="255" text-anchor="middle" class="t">Right Arm</text>
  <text x="1085" y="276" text-anchor="middle" class="s">A_R</text>
  <rect x="865" y="330" width="130" height="72" class="mini" fill="#eaf7f4" stroke="#a7d8cf"/>
  <text x="930" y="360" text-anchor="middle" class="t">Left Gripper</text>
  <text x="930" y="381" text-anchor="middle" class="s">A_gL</text>
  <rect x="1020" y="330" width="130" height="72" class="mini" fill="#fff6df" stroke="#ead08b"/>
  <text x="1085" y="360" text-anchor="middle" class="t">Right Gripper</text>
  <text x="1085" y="381" text-anchor="middle" class="s">A_gR</text>

  <!-- Weight generator -->
  <rect x="840" y="540" width="340" height="135" class="box" fill="#fff8ef" stroke="#efd1a8"/>
  <text x="1010" y="575" text-anchor="middle" class="h">Role-Phase Weighting</text>
  <rect x="884" y="606" width="252" height="44" class="mini" fill="#ffffff" stroke="#f1d9b9"/>
  <text x="1010" y="634" text-anchor="middle" class="t">w_L, w_R, w_gL, w_gR</text>

  <!-- Loss -->
  <rect x="1280" y="240" width="260" height="330" class="box" fill="#f4fbff" stroke="#b7d7ee"/>
  <text x="1410" y="276" text-anchor="middle" class="h">BTA Objective</text>
  <rect x="1310" y="315" width="200" height="54" class="mini" fill="#ffffff" stroke="#cfe3f3"/>
  <text x="1410" y="348" text-anchor="middle" class="t">Subspace Losses</text>
  <text x="1410" y="408" text-anchor="middle" class="eq">L_BTA = Σ w_i L_i</text>
  <text x="1410" y="436" text-anchor="middle" class="s">+ smoothness</text>
  <rect x="1310" y="478" width="200" height="54" class="mini" fill="#ffffff" stroke="#cfe3f3"/>
  <text x="1410" y="511" text-anchor="middle" class="t">Failure Diagnosis</text>

  <!-- Diagnostics strip -->
  <rect x="625" y="745" width="620" height="70" class="box" fill="#fbfbfd" stroke="#d6dce2"/>
  <text x="660" y="786" class="h">Diagnostics:</text>
  <text x="785" y="786" class="t">right grasp</text>
  <text x="910" y="786" class="t">right pour</text>
  <text x="1030" y="786" class="t">left cup</text>
  <text x="1135" y="786" class="t">grippers</text>
  <text x="1222" y="786" class="t">coordination</text>

  <!-- Arrows -->
  <path d="M325 390 C365 390 370 300 410 300" class="arrow"/>
  <path d="M560 395 V475" class="arrow"/>
  <path d="M715 565 C765 565 775 305 830 305" class="arrow"/>
  <path d="M1185 305 C1235 305 1230 370 1280 370" class="arrow"/>
  <path d="M1180 608 C1235 608 1235 465 1280 465" class="dash"/>
  <path d="M1010 675 C1010 720 1010 730 1010 745" class="dash"/>
  <path d="M1410 570 C1410 710 1235 728 1235 745" class="dash"/>

  <!-- Small connector lines inside subspace -->
  <path d="M930 297 V330" class="thin"/>
  <path d="M1085 297 V330" class="thin"/>
</svg>
