<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="680" viewBox="0 0 1500 680">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>

    <style>
      text {
        font-family: "Times New Roman", "Nimbus Roman", Georgia, serif;
      }
      .fig-title {
        font-size: 34px;
        font-weight: 700;
        fill: #111111;
      }
      .fig-subtitle {
        font-size: 19px;
        font-style: italic;
        fill: #555555;
      }
      .module-title {
        font-size: 28px;
        font-weight: 700;
        fill: #111111;
      }
      .label {
        font-size: 19px;
        fill: #111111;
      }
      .label-bold {
        font-size: 20px;
        font-weight: 700;
        fill: #111111;
      }
      .small {
        font-size: 16px;
        fill: #444444;
      }
      .arrow {
        stroke: #111111;
        stroke-width: 2.4;
        fill: none;
        marker-end: url(#arrow);
      }
      .thin-arrow {
        stroke: #111111;
        stroke-width: 2.0;
        fill: none;
        marker-end: url(#arrow);
      }
      .module-left {
        fill: #fbf8ff;
        stroke: #b79add;
        stroke-width: 2.0;
      }
      .module-right {
        fill: #fff9ef;
        stroke: #e6b26b;
        stroke-width: 2.0;
      }
      .card {
        fill: #ffffff;
        stroke: #7d728b;
        stroke-width: 1.3;
      }
      .sample-card {
        fill: #ffffff;
        stroke: #6f6f6f;
        stroke-width: 1.2;
      }
      .blue {
        fill: #e6f1ff;
        stroke: #2e73b8;
      }
      .green {
        fill: #e9f7ec;
        stroke: #2f8a43;
      }
      .purple {
        fill: #f1e8fb;
        stroke: #7b54b3;
      }
      .yellow {
        fill: #fff4d9;
        stroke: #d99a17;
      }
      .orange {
        fill: #fff0e2;
        stroke: #d97706;
      }
      .muted {
        fill: #f7f7f7;
        stroke: #555555;
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="680" fill="#ffffff"/>

  <text class="fig-title" x="750" y="48" text-anchor="middle">Role-aware Balanced Subskill Sampling</text>
  <text class="fig-subtitle" x="750" y="78" text-anchor="middle">Encode task phases as role tokens and draw equal samples for a balanced training batch</text>

  <!-- Left module: Task Role Token -->
  <rect class="module-left" x="70" y="118" width="430" height="440" rx="18"/>
  <text class="module-title" x="285" y="165" text-anchor="middle">Task Role Token</text>
  <text class="small" x="285" y="194" text-anchor="middle">Subtasks / action phases encoded as tokens</text>

  <g>
    <rect class="card" x="105" y="225" width="360" height="48" rx="9"/>
    <rect class="blue" x="127" y="238" width="23" height="23" rx="4" stroke-width="1.6"/>
    <text class="label" x="172" y="256">RIGHT_GRASP_BOTTLE</text>

    <rect class="card" x="105" y="287" width="360" height="48" rx="9"/>
    <rect class="green" x="127" y="300" width="23" height="23" rx="4" stroke-width="1.6"/>
    <text class="label" x="172" y="318">RIGHT_ALIGN_POUR</text>

    <rect class="card" x="105" y="349" width="360" height="48" rx="9"/>
    <rect class="purple" x="127" y="362" width="23" height="23" rx="4" stroke-width="1.6"/>
    <text class="label" x="172" y="380">LEFT_GRASP_CUP</text>

    <rect class="card" x="105" y="411" width="360" height="48" rx="9"/>
    <rect class="yellow" x="127" y="424" width="23" height="23" rx="4" stroke-width="1.6"/>
    <text class="label" x="172" y="442">LEFT_PLACE_CUP</text>

    <rect class="card" x="105" y="473" width="360" height="48" rx="9"/>
    <rect class="orange" x="127" y="486" width="23" height="23" rx="4" stroke-width="1.6"/>
    <text class="label" x="172" y="504">BIMANUAL_HOLD_POUR</text>
  </g>

  <!-- Main connection arrow -->
  <path class="arrow" d="M500 338 H625"/>
  <text class="small" x="562" y="319" text-anchor="middle">role-conditioned</text>
  <text class="small" x="562" y="360" text-anchor="middle">balancing</text>

  <!-- Right module: Balanced Subskill Sampler -->
  <rect class="module-right" x="625" y="118" width="805" height="440" rx="18"/>
  <text class="module-title" x="1028" y="165" text-anchor="middle">Balanced Subskill Sampler</text>
  <text class="small" x="1028" y="194" text-anchor="middle">Sample the same amount from each subskill bucket</text>

  <!-- Subskill database buckets -->
  <g>
    <!-- bucket 1 -->
    <g transform="translate(670,225)">
      <rect class="blue" x="0" y="10" width="72" height="32" stroke-width="1.6"/>
      <ellipse class="blue" cx="36" cy="10" rx="36" ry="10" stroke-width="1.6"/>
      <path d="M0 42 C0 48 72 48 72 42" fill="#e6f1ff" stroke="#2e73b8" stroke-width="1.6"/>
    </g>
    <path class="thin-arrow" d="M750 251 H835"/>
    <rect class="sample-card" x="850" y="230" width="155" height="42" rx="8"/>
    <text class="label-bold" x="927" y="257" text-anchor="middle">Equal Samples</text>
    <path class="thin-arrow" d="M1005 251 H1162"/>

    <!-- bucket 2 -->
    <g transform="translate(670,287)">
      <rect class="green" x="0" y="10" width="72" height="32" stroke-width="1.6"/>
      <ellipse class="green" cx="36" cy="10" rx="36" ry="10" stroke-width="1.6"/>
      <path d="M0 42 C0 48 72 48 72 42" fill="#e9f7ec" stroke="#2f8a43" stroke-width="1.6"/>
    </g>
    <path class="thin-arrow" d="M750 313 H835"/>
    <rect class="sample-card" x="850" y="292" width="155" height="42" rx="8"/>
    <text class="label-bold" x="927" y="319" text-anchor="middle">Equal Samples</text>
    <path class="thin-arrow" d="M1005 313 H1162"/>

    <!-- bucket 3 -->
    <g transform="translate(670,349)">
      <rect class="purple" x="0" y="10" width="72" height="32" stroke-width="1.6"/>
      <ellipse class="purple" cx="36" cy="10" rx="36" ry="10" stroke-width="1.6"/>
      <path d="M0 42 C0 48 72 48 72 42" fill="#f1e8fb" stroke="#7b54b3" stroke-width="1.6"/>
    </g>
    <path class="thin-arrow" d="M750 375 H835"/>
    <rect class="sample-card" x="850" y="354" width="155" height="42" rx="8"/>
    <text class="label-bold" x="927" y="381" text-anchor="middle">Equal Samples</text>
    <path class="thin-arrow" d="M1005 375 H1162"/>

    <!-- bucket 4 -->
    <g transform="translate(670,411)">
      <rect class="yellow" x="0" y="10" width="72" height="32" stroke-width="1.6"/>
      <ellipse class="yellow" cx="36" cy="10" rx="36" ry="10" stroke-width="1.6"/>
      <path d="M0 42 C0 48 72 48 72 42" fill="#fff4d9" stroke="#d99a17" stroke-width="1.6"/>
    </g>
    <path class="thin-arrow" d="M750 437 H835"/>
    <rect class="sample-card" x="850" y="416" width="155" height="42" rx="8"/>
    <text class="label-bold" x="927" y="443" text-anchor="middle">Equal Samples</text>
    <path class="thin-arrow" d="M1005 437 H1162"/>

    <!-- bucket 5 -->
    <g transform="translate(670,473)">
      <rect class="orange" x="0" y="10" width="72" height="32" stroke-width="1.6"/>
      <ellipse class="orange" cx="36" cy="10" rx="36" ry="10" stroke-width="1.6"/>
      <path d="M0 42 C0 48 72 48 72 42" fill="#fff0e2" stroke="#d97706" stroke-width="1.6"/>
    </g>
    <path class="thin-arrow" d="M750 499 H835"/>
    <rect class="sample-card" x="850" y="478" width="155" height="42" rx="8"/>
    <text class="label-bold" x="927" y="505" text-anchor="middle">Equal Samples</text>
    <path class="thin-arrow" d="M1005 499 H1162"/>
  </g>

  <!-- Balanced training batch -->
  <rect x="1162" y="215" width="230" height="315" rx="14" fill="#ffffff" stroke="#555555" stroke-width="1.7" stroke-dasharray="7 6"/>
  <text class="label-bold" x="1277" y="250" text-anchor="middle">Training Batch</text>
  <text class="label-bold" x="1277" y="276" text-anchor="middle">(Balanced)</text>

  <g transform="translate(1203,302)">
    <rect x="0" y="14" width="148" height="176" fill="#ffffff" stroke="#555555" stroke-width="1.8"/>
    <rect x="0" y="14" width="148" height="35" fill="#e6f1ff"/>
    <rect x="0" y="49" width="148" height="35" fill="#e9f7ec"/>
    <rect x="0" y="84" width="148" height="35" fill="#f1e8fb"/>
    <rect x="0" y="119" width="148" height="35" fill="#fff4d9"/>
    <rect x="0" y="154" width="148" height="36" fill="#fff0e2"/>
    <line x1="0" y1="49" x2="148" y2="49" stroke="#ffffff" stroke-width="2"/>
    <line x1="0" y1="84" x2="148" y2="84" stroke="#ffffff" stroke-width="2"/>
    <line x1="0" y1="119" x2="148" y2="119" stroke="#ffffff" stroke-width="2"/>
    <line x1="0" y1="154" x2="148" y2="154" stroke="#ffffff" stroke-width="2"/>
    <ellipse cx="74" cy="14" rx="74" ry="18" fill="#f7fbff" stroke="#555555" stroke-width="1.8"/>
    <path d="M0 190 C0 214 148 214 148 190" fill="#fff0e2" stroke="#555555" stroke-width="1.8"/>
    <line x1="0" y1="14" x2="0" y2="190" stroke="#555555" stroke-width="1.8"/>
    <line x1="148" y1="14" x2="148" y2="190" stroke="#555555" stroke-width="1.8"/>
  </g>

  <text class="small" x="1277" y="515" text-anchor="middle">balanced across five subskills</text>

  <!-- Bottom legend / novelty note -->
  <rect x="235" y="594" width="1030" height="46" rx="9" fill="#ffffff" stroke="#c7c7c7" stroke-width="1.2"/>
  <text class="small" x="750" y="623" text-anchor="middle">
    Core novelty: role tokens explicitly index subskills, and the sampler prevents dominant phases from overwhelming training.
  </text>
</svg>
