<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <defs>
    <style>
      .title{font:700 30px Arial,Helvetica,sans-serif;fill:#22313a}
      .subtitle{font:500 15px Arial,Helvetica,sans-serif;fill:#60737c}
      .section{font:700 18px Arial,Helvetica,sans-serif;fill:#263238}
      .label{font:600 14px Arial,Helvetica,sans-serif;fill:#37474f}
      .small{font:500 12px Arial,Helvetica,sans-serif;fill:#607d8b}
      .tiny{font:500 10.5px Arial,Helvetica,sans-serif;fill:#607d8b}
      .panel{rx:18;ry:18;stroke-width:2.2}
      .card{rx:12;ry:12;stroke-width:1.8}
      .chip{rx:9;ry:9;stroke-width:1.5}
      .arrow{stroke:#6f8791;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .feedback{stroke:#8a9aa2;stroke-width:2.4;fill:none;stroke-dasharray:8 7;marker-end:url(#arrow)}
      .diag{stroke:#9aa9b0;stroke-width:2;fill:none;stroke-dasharray:7 6}
      .icon{stroke:#546e7a;stroke-width:2.1;fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6f8791"/>
    </marker>
    <clipPath id="clipScene"><rect x="78" y="167" width="234" height="58" rx="12" ry="12"/></clipPath>
    <clipPath id="clipHead"><rect x="78" y="246" width="72" height="58" rx="12" ry="12"/></clipPath>
    <clipPath id="clipLeft"><rect x="159" y="246" width="72" height="58" rx="12" ry="12"/></clipPath>
    <clipPath id="clipRight"><rect x="240" y="246" width="72" height="58" rx="12" ry="12"/></clipPath>
  </defs>

  <rect width="1800" height="980" fill="#ffffff"/>
  <text x="900" y="50" text-anchor="middle" class="title">Figure 3-1. Overall Framework of the Bimanual Task-aware VLA Service Robot System</text>
  <text x="900" y="78" text-anchor="middle" class="subtitle">Closed-loop pipeline: perception → VLA reasoning → BTA adaptation → bimanual action → safe execution → feedback</text>

  <!-- Column 1: task environment -->
  <rect x="50" y="125" width="290" height="510" class="panel" fill="#f8fbfd" stroke="#d4dde4"/>
  <text x="195" y="153" text-anchor="middle" class="section">Task Environment</text>

  <rect x="78" y="167" width="234" height="58" class="card" fill="#ffffff" stroke="#dce5eb"/>
  <image href="task.jpg" x="78" y="167" width="234" height="58" preserveAspectRatio="xMidYMid slice" clip-path="url(#clipScene)"/>
  <text x="195" y="241" text-anchor="middle" class="small">Beverage Service Scene</text>

  <image href="head.jpg" x="78" y="246" width="72" height="58" preserveAspectRatio="xMidYMid slice" clip-path="url(#clipHead)"/>
  <rect x="78" y="246" width="72" height="58" class="card" fill="none" stroke="#dce5eb"/>
  <image href="left-hand.jpg" x="159" y="246" width="72" height="58" preserveAspectRatio="xMidYMid slice" clip-path="url(#clipLeft)"/>
  <rect x="159" y="246" width="72" height="58" class="card" fill="none" stroke="#dce5eb"/>
  <image href="right-hand.jpg" x="240" y="246" width="72" height="58" preserveAspectRatio="xMidYMid slice" clip-path="url(#clipRight)"/>
  <rect x="240" y="246" width="72" height="58" class="card" fill="none" stroke="#dce5eb"/>
  <text x="114" y="321" text-anchor="middle" class="tiny">Head View</text>
  <text x="195" y="321" text-anchor="middle" class="tiny">Left Wrist</text>
  <text x="276" y="321" text-anchor="middle" class="tiny">Right Wrist</text>

  <rect x="78" y="350" width="234" height="48" class="card" fill="#ffffff" stroke="#dce5eb"/>
  <text x="195" y="380" text-anchor="middle" class="label">AgiBot G1 Robot</text>
  <rect x="78" y="414" width="108" height="58" class="card" fill="#ffffff" stroke="#dce5eb"/>
  <text x="132" y="438" text-anchor="middle" class="small">Bottle</text>
  <text x="132" y="458" text-anchor="middle" class="tiny">grasp / pour</text>
  <rect x="204" y="414" width="108" height="58" class="card" fill="#ffffff" stroke="#dce5eb"/>
  <text x="258" y="438" text-anchor="middle" class="small">Cup</text>
  <text x="258" y="458" text-anchor="middle" class="tiny">hold / place</text>
  <rect x="78" y="488" width="108" height="58" class="card" fill="#ffffff" stroke="#dce5eb"/>
  <text x="132" y="512" text-anchor="middle" class="small">Coaster</text>
  <text x="132" y="532" text-anchor="middle" class="tiny">target area</text>
  <rect x="204" y="488" width="108" height="58" class="card" fill="#ffffff" stroke="#dce5eb"/>
  <text x="258" y="512" text-anchor="middle" class="small">Distractors</text>
  <text x="258" y="532" text-anchor="middle" class="tiny">multi-object table</text>
  <rect x="78" y="562" width="234" height="44" class="card" fill="#ffffff" stroke="#dce5eb"/>
  <text x="195" y="589" text-anchor="middle" class="label">User Language Command</text>

  <!-- Column 2: multimodal input -->
  <rect x="390" y="125" width="260" height="510" class="panel" fill="#f3f9ff" stroke="#aacce8"/>
  <text x="520" y="153" text-anchor="middle" class="section">Multimodal Inputs</text>
  <rect x="420" y="185" width="200" height="66" class="card" fill="#ffffff" stroke="#c5dff2"/>
  <text x="520" y="211" text-anchor="middle" class="label">Visual Input</text>
  <text x="520" y="233" text-anchor="middle" class="tiny">global + left/right wrist</text>
  <rect x="420" y="275" width="200" height="66" class="card" fill="#ffffff" stroke="#c5dff2"/>
  <text x="520" y="301" text-anchor="middle" class="label">State Input</text>
  <text x="520" y="323" text-anchor="middle" class="tiny">left/right arm joints</text>
  <rect x="420" y="365" width="200" height="66" class="card" fill="#ffffff" stroke="#c5dff2"/>
  <text x="520" y="391" text-anchor="middle" class="label">Gripper Input</text>
  <text x="520" y="413" text-anchor="middle" class="tiny">left/right gripper states</text>
  <rect x="420" y="455" width="200" height="66" class="card" fill="#ffffff" stroke="#c5dff2"/>
  <text x="520" y="481" text-anchor="middle" class="label">Language Input</text>
  <text x="520" y="503" text-anchor="middle" class="tiny">task instruction</text>
  <rect x="420" y="545" width="200" height="48" class="card" fill="#eaf5ff" stroke="#b7d7ee"/>
  <text x="520" y="575" text-anchor="middle" class="small">Observation o_t</text>

  <!-- Column 3: VLA -->
  <rect x="700" y="125" width="285" height="510" class="panel" fill="#f7f4ff" stroke="#cbc1ee"/>
  <text x="842" y="153" text-anchor="middle" class="section">VLA Policy Backbone</text>
  <rect x="730" y="188" width="225" height="62" class="card" fill="#ffffff" stroke="#ded6f4"/>
  <text x="842" y="214" text-anchor="middle" class="label">Vision Encoder</text>
  <text x="842" y="235" text-anchor="middle" class="tiny">scene and local features</text>
  <rect x="730" y="276" width="225" height="62" class="card" fill="#ffffff" stroke="#ded6f4"/>
  <text x="842" y="302" text-anchor="middle" class="label">Language-State Fusion</text>
  <text x="842" y="323" text-anchor="middle" class="tiny">conditioned policy features</text>
  <rect x="730" y="364" width="225" height="62" class="card" fill="#ffffff" stroke="#ded6f4"/>
  <text x="842" y="390" text-anchor="middle" class="label">Action Prior</text>
  <text x="842" y="411" text-anchor="middle" class="tiny">pretrained behavior model</text>
  <rect x="730" y="490" width="225" height="64" class="card" fill="#efeaff" stroke="#c8bbef"/>
  <text x="842" y="516" text-anchor="middle" class="label">H-step Action Chunk</text>
  <text x="842" y="538" text-anchor="middle" class="tiny">A_t = [a_t ... a_{t+H-1}]</text>

  <!-- Column 4: BTA -->
  <rect x="1035" y="125" width="345" height="510" class="panel" fill="#fff7ed" stroke="#e8c79c"/>
  <text x="1208" y="153" text-anchor="middle" class="section">BTA Adapter</text>
  <text x="1208" y="175" text-anchor="middle" class="subtitle">Bimanual Task-aware Adapter</text>
  <rect x="1065" y="205" width="135" height="64" class="card" fill="#ffffff" stroke="#efd6b2"/>
  <text x="1132" y="231" text-anchor="middle" class="label">Task Roles</text>
  <text x="1132" y="252" text-anchor="middle" class="tiny">role tokens</text>
  <rect x="1215" y="205" width="135" height="64" class="card" fill="#ffffff" stroke="#efd6b2"/>
  <text x="1282" y="231" text-anchor="middle" class="label">Phases</text>
  <text x="1282" y="252" text-anchor="middle" class="tiny">phase prompts</text>
  <rect x="1065" y="293" width="135" height="64" class="card" fill="#ffffff" stroke="#efd6b2"/>
  <text x="1132" y="319" text-anchor="middle" class="label">Subspaces</text>
  <text x="1132" y="340" text-anchor="middle" class="tiny">L / R / gL / gR</text>
  <rect x="1215" y="293" width="135" height="64" class="card" fill="#ffffff" stroke="#efd6b2"/>
  <text x="1282" y="319" text-anchor="middle" class="label">Weighted Loss</text>
  <text x="1282" y="340" text-anchor="middle" class="tiny">diagnosable training</text>

  <rect x="1065" y="393" width="285" height="162" class="card" fill="#ffffff" stroke="#efd6b2"/>
  <text x="1208" y="421" text-anchor="middle" class="label">Role Tokens</text>
  <rect x="1085" y="438" width="116" height="24" class="chip" fill="#fff3e4" stroke="#eccb9c"/>
  <text x="1143" y="454" text-anchor="middle" class="tiny">RIGHT_GRASP</text>
  <rect x="1215" y="438" width="116" height="24" class="chip" fill="#fff3e4" stroke="#eccb9c"/>
  <text x="1273" y="454" text-anchor="middle" class="tiny">RIGHT_POUR</text>
  <rect x="1085" y="471" width="116" height="24" class="chip" fill="#fff3e4" stroke="#eccb9c"/>
  <text x="1143" y="487" text-anchor="middle" class="tiny">LEFT_GRASP</text>
  <rect x="1215" y="471" width="116" height="24" class="chip" fill="#fff3e4" stroke="#eccb9c"/>
  <text x="1273" y="487" text-anchor="middle" class="tiny">LEFT_PLACE</text>
  <rect x="1123" y="504" width="170" height="24" class="chip" fill="#fff3e4" stroke="#eccb9c"/>
  <text x="1208" y="520" text-anchor="middle" class="tiny">BIMANUAL_HOLD_POUR</text>
  <text x="1208" y="543" text-anchor="middle" class="tiny">approach | grasp | align | pour | recover | place</text>

  <!-- Column 5: action and safety -->
  <rect x="1430" y="125" width="305" height="510" class="panel" fill="#f1fbf7" stroke="#a7d6bd"/>
  <text x="1582" y="153" text-anchor="middle" class="section">Action and Safety</text>
  <rect x="1460" y="188" width="245" height="72" class="card" fill="#ffffff" stroke="#c7e5d4"/>
  <text x="1582" y="215" text-anchor="middle" class="label">Action Chunk Decode</text>
  <text x="1582" y="237" text-anchor="middle" class="tiny">left arm | right arm | grippers</text>
  <rect x="1460" y="286" width="245" height="72" class="card" fill="#ffffff" stroke="#c7e5d4"/>
  <text x="1582" y="313" text-anchor="middle" class="label">Safety Execution</text>
  <text x="1582" y="335" text-anchor="middle" class="tiny">limits | smoothing | checks</text>
  <rect x="1460" y="384" width="245" height="72" class="card" fill="#ffffff" stroke="#c7e5d4"/>
  <text x="1582" y="411" text-anchor="middle" class="label">Robot Control</text>
  <text x="1582" y="433" text-anchor="middle" class="tiny">bimanual real-time execution</text>
  <rect x="1460" y="494" width="112" height="54" class="card" fill="#ffffff" stroke="#c7e5d4"/>
  <text x="1516" y="517" text-anchor="middle" class="small">Stop</text>
  <text x="1516" y="535" text-anchor="middle" class="tiny">protection</text>
  <rect x="1593" y="494" width="112" height="54" class="card" fill="#ffffff" stroke="#c7e5d4"/>
  <text x="1649" y="517" text-anchor="middle" class="small">Handover</text>
  <text x="1649" y="535" text-anchor="middle" class="tiny">manual takeover</text>
  <rect x="1460" y="570" width="245" height="38" class="card" fill="#e7f7ef" stroke="#a7d6bd"/>
  <text x="1582" y="594" text-anchor="middle" class="small">Real Robot Execution</text>

  <!-- Main horizontal arrows -->
  <path d="M340 380 H390" class="arrow"/>
  <path d="M650 380 H700" class="arrow"/>
  <path d="M985 380 H1035" class="arrow"/>
  <path d="M1380 380 H1430" class="arrow"/>

  <!-- Internal vertical arrows -->
  <path d="M842 250 V276" class="arrow"/>
  <path d="M842 338 V364" class="arrow"/>
  <path d="M842 426 V490" class="arrow"/>
  <path d="M1582 260 V286" class="arrow"/>
  <path d="M1582 358 V384" class="arrow"/>
  <path d="M1582 456 V570" class="arrow"/>

  <!-- Feedback loop -->
  <path d="M1582 635 V700 H195 V635" class="feedback"/>
  <text x="890" y="724" text-anchor="middle" class="small">environment feedback and next observation</text>

  <!-- Training and diagnostics bottom panel -->
  <rect x="390" y="760" width="990" height="150" class="panel" fill="#fbfbfd" stroke="#cfd7de"/>
  <rect x="410" y="780" width="950" height="110" class="diag"/>
  <text x="885" y="810" text-anchor="middle" class="section">Training and Diagnostic Signals</text>
  <rect x="445" y="838" width="150" height="34" class="chip" fill="#ffffff" stroke="#d4dde4"/>
  <text x="520" y="860" text-anchor="middle" class="small">Global Loss</text>
  <rect x="625" y="838" width="150" height="34" class="chip" fill="#ffffff" stroke="#d4dde4"/>
  <text x="700" y="860" text-anchor="middle" class="small">Left Arm Loss</text>
  <rect x="805" y="838" width="150" height="34" class="chip" fill="#ffffff" stroke="#d4dde4"/>
  <text x="880" y="860" text-anchor="middle" class="small">Right Arm Loss</text>
  <rect x="985" y="838" width="150" height="34" class="chip" fill="#ffffff" stroke="#d4dde4"/>
  <text x="1060" y="860" text-anchor="middle" class="small">Gripper Loss</text>
  <rect x="1165" y="838" width="150" height="34" class="chip" fill="#ffffff" stroke="#d4dde4"/>
  <text x="1240" y="860" text-anchor="middle" class="small">Phase Failure</text>
  <path d="M1208 635 V760" class="feedback"/>
</svg>
